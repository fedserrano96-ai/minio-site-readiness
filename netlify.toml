[build]
  publish = "."
  # Strip internal material from the deployed copy (repo itself is untouched):
  # research snapshot archives, specs/plans, tests, and internal docs are not
  # part of the public site and were tripping Netlify's secrets scanner.
  command = "rm -rf permitting-engine/research permitting-engine/docs permitting-engine/tests permitting-engine/CLAUDE.md permitting-engine/README.md permitting-engine/permitting_engine_data_model.md site-readiness-spec.md"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  # Archived third-party webpage snapshots (permitting research citations) contain
  # public client-side Google Maps keys from the source sites; not our secrets.
  SECRETS_SCAN_OMIT_PATHS = "permitting-engine/research/sources/**"
  # The City of Del Mar's own public client-side Google Maps key, embedded in
  # their webpages and captured in our archived snapshots. Not our credential.
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyDWUuE-ifkbhxblF920N8MjpBdTg1Wt784"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
